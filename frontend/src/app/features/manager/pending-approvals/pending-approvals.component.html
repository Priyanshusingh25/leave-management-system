<div class="container">
    <h1>Pending Leave Approvals</h1>
    <div class="card" *ngIf="leaves">
        <table *ngIf="leaves.content.length > 0">
            <thead>
                <tr>
                    <th>Employee</th>
                    <th>Type</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Days</th>
                    <th>Reason</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let leave of leaves.content">
                    <td>{{ leave.employeeName }}</td>
                    <td>{{ leave.leaveType }}</td>
                    <td>{{ leave.startDate }}</td>
                    <td>{{ leave.endDate }}</td>
                    <td>{{ leave.numberOfDays }}</td>
                    <td>{{ leave.reason }}</td>
                    <td>
                        <button (click)="approve(leave.id)" class="button success">Approve</button>
                        <button (click)="reject(leave.id)" class="button danger">Reject</button>
                    </td>
                </tr>
            </tbody>
        </table>
        <p *ngIf="leaves.content.length === 0">No pending leave requests</p>
    </div>
    <div *ngIf="!leaves" class="loading">Loading...</div>
</div>
