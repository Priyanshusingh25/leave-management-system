 <div class="container">
      <h1>Team Leave History</h1>
      <div class="card" *ngIf="leaves">
        <table *ngIf="leaves.content.length > 0">
          <thead>
            <tr>
              <th>Employee</th>
              <th>Type</th>
              <th>Start Date</th>
              <th>End Date</th>
              <th>Days</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let leave of leaves.content">
              <td>{{ leave.employeeName }}</td>
              <td>{{ leave.leaveType }}</td>
              <td>{{ leave.startDate }}</td>
              <td>{{ leave.endDate }}</td>
              <td>{{ leave.numberOfDays }}</td>
              <td><span class="badge" [ngClass]="leave.status | lowercase">{{ leave.status }}</span></td>
            </tr>
          </tbody>
        </table>
        <p *ngIf="leaves.content.length === 0">No leave records found</p>
      </div>
      <div *ngIf="!leaves" class="loading">Loading...</div>
    </div>
