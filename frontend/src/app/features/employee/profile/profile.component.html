<div class="container">
    <h1>Employee Profile</h1>
    <div class="card" *ngIf="employee">
        <div class="profile-info">
            <div class="info-row">
                <label>Name:</label>
                <span>{{ employee.name }}</span>
            </div>
            <div class="info-row">
                <label>Email:</label>
                <span>{{ employee.email }}</span>
            </div>
            <div class="info-row">
                <label>Department:</label>
                <span>{{ employee.department }}</span>
            </div>
            <div class="info-row">
                <label>Role:</label>
                <span>{{ employee.role }}</span>
            </div>
        </div>
    </div>
    <div *ngIf="!employee" class="loading">Loading...</div>
</div>
